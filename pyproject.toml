[project]
name = "math-slang"
version = "0.1.0"
description = "Math utils for Slang"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pyglm>=2.8.3",
    "pytest>=9.0.3",
    "slangpy>=0.40.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "black>=26.3.1",
]
