[project]
name = "glm-slang-workspace"
version = "0.1.0"
description = "Math utils for Slang"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["glm-slang"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = []

[tool.uv.workspace]
members = [
  "libs/glm_slang",
  "external/spm"
]

[tool.uv.sources]
glm-slang = { workspace = true }
